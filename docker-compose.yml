version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: store_intelligence_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - db_volume:/app/db
    environment:
      - DB_PATH=/app/db/store_intelligence.db
      - POS_CSV_PATH=/app/data/pos_transactions.csv
      - SAMPLE_EVENTS_PATH=/app/data/sample_events.jsonl
      - LAYOUT_PATH=/app/data/store_layout.json
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    container_name: store_intelligence_dashboard
    ports:
      - "3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_volume:
